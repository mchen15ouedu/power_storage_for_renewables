# OSCER (OU) configuration -- 3-hourly pipeline.
#   raw 3-hourly granules : /scratch/mchen15/gldas/raw/<YEAR>/   (wget, purged after reduction)
#   wget URL list         : /scratch/mchen15/gldas/gldas_list.txt (user-provided, from GES DISC)
#   3-hourly zonal means  : /ourdisk/hpc/caps/mchen15/gldas_full/ (monthly parquet, the durable archive)
#   analysis + figures    : /ourdisk/hpc/caps/mchen15/gldas_analysis/

paths:
  data_dir:    /ourdisk/hpc/caps/mchen15/gldas_analysis/data
  raw_dir:     /scratch/mchen15/gldas/raw
  zonal_dir:   /ourdisk/hpc/caps/mchen15/gldas_full
  regions_gpkg: /ourdisk/hpc/caps/mchen15/gldas_analysis/data/regions.gpkg
  regions_csv:  /ourdisk/hpc/caps/mchen15/gldas_analysis/data/regions.csv
  weights_npz:  /ourdisk/hpc/caps/mchen15/gldas_analysis/data/region_weights.npz
  results_dir: /ourdisk/hpc/caps/mchen15/gldas_analysis/results
  figures_dir: /ourdisk/hpc/caps/mchen15/gldas_analysis/figures

period:
  start: "2000-01-01"
  end:   "2025-12-31"

gldas:
  short_name: GLDAS_NOAH025_3H
  version: "2.1"
  variables:
    SWdown_f_tavg: swdown
    Wind_f_inst:   wind10
    Tair_f_inst:   tair
    Psurf_f_inst:  psurf
    Qair_f_inst:   qair
  download_mode: local         # granules are fetched by wget in the sbatch script
  delete_raw: false            # the sbatch script removes each year's raw folder itself
  granules_per_day: 8

regions:
  admin1_area_km2: 1.5e6
  admin1_force: []
  include_countries: []
  exclude: [ATA]
  nearest_cell_fallback: true

energy:
  wind:
    ref_height_m: 10.0
    hub_height_m: 80.0
    veg_height_m: 1.5
    start_ms: 3.0
    plateau_ms: 12.0
    density_correction: true
    rho0: 1.225
  solar:
    start_wm2: 0.0
    plateau_wm2: 1000.0

storage:
  up_efficiency: 0.9
  down_efficiency: 0.8
  annual_decay: 0.7
  max_iterations: 20
  tolerance: 1.0e-3

demand:
  profile: flat
  monthly_csv: null
  balance_temp_k: 291.15
  base_fraction: 0.6

analysis:
  mix_step: 0.05
  dunkelflaute_cf_frac: 0.5
  gap_window_days: 30
  trends: true
  pools: true
  archetypes:
    - {name: liion,   up_efficiency: 0.95, down_efficiency: 0.95, annual_decay: 0.98}
    - {name: pumped,  up_efficiency: 0.85, down_efficiency: 0.90, annual_decay: 0.95}
    - {name: h2,      up_efficiency: 0.60, down_efficiency: 0.50, annual_decay: 1.00}
